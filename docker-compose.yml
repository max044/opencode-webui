version: '3.8'

services:
  opencode:
    build: .
    image: opencode-webui-workspace:latest
    container_name: opencode-webui
    ports:
      - "${PORT:-4096}:${PORT:-4096}"
    environment:
      OPENCODE_SERVER_USERNAME: ${OPENCODE_SERVER_USERNAME:-opencode}
      OPENCODE_SERVER_PASSWORD: ${OPENCODE_SERVER_PASSWORD:-change-me}
      PORT: ${PORT:-4096}
      OPENCODE_DATA_DIR: ${OPENCODE_DATA_DIR:-/home/opencode/.opencode}
    volumes:
      - ./opencode-home:/home/opencode
    restart: unless-stopped
    networks:
      - opencode-network
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:${PORT:-4096}" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  opencode-network:
    driver: bridge
